<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="/AllCSS.css">
    <link rel="stylesheet" type="text/css" href="/2000s.css">
    <script type="text/javascript">
    function SearchResults() {
      var url = window.location.href;
      var urlParams = new URLSearchParams(url.split('?')[1]);
      var keyword = urlParams.get('keyword') || urlParams.get('q');
      var filter = urlParams.get('f');
      if (keyword) {
        document.getElementById('keyword-display').innerHTML = " " + keyword;
      }
      if (filter) {
        document.getElementById('filter-display').innerHTML = " (Filtered by: " + filter + ")";
      }
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.485">
    <title>Ebbi's Site O' Fun! - Search</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <body onLoad="SearchResults()">
  <div id="wrapper">
    <img src="/images/catcomputer.gif" alt="Nuko Cat on a computer!" width="35" height="35"/>
    <h2>Search:</h2>
    <h2><p>Search results for:<span id="keyword-display"></span><span id="filter-display"></span></p></h2>
    <h1><p>Search is currently going under work, once done it'll search through my blog for whatever it is you're looking for!</p></h1>
    <div>Want to see something cool? Check out <a href="/blog.html" title="A link to a blog called Ebbi's Blog O' Fun!">Ebbi's Blog O' Fun!</a></div>
  </div>
  <script src="/scripts/header.js"></script>
  </body>
</html>
